<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Daftar Jadi Bocil Windah Basudara</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="main_content">
        <div class="form_box">
            <div class="form_title">
                🎮 Daftar Jadi Bocil Windah Basudara
            </div>
            <div class="form_content">
                <form>

                    <!-- Nama -->
                    <label class="form_label">Nama</label>
                    <input type="text" name="nama" class="form_textbox" placeholder="Nama Anomali">

                    <!-- Asal -->
                    <label class="form_label">Asal</label>
                    <input type="text" name="asal" class="form_textbox" placeholder="Asal anomali dri mana">

                    <!-- Umur -->
                    <label class="form_label">Umur</label>
                    <input type="text" name="umur" class="form_textbox" placeholder="Umur bocil anomali berapa">

                    <!-- No HP -->
                    <label class="form_label">No HP</label>
                    <input type="text" name="no_hp" class="form_textbox" placeholder="No hengfon bocil anomali">

                    <!-- Upload Bukti -->
                    <label class="form_label">Bukti Bocil Sudah Subscribe Channel Windah!</label>
                    <input type="file" name="bukti" class="form_textbox">

                    <!-- Status Bocil -->
                    <label class="form_label">Status Bocil</label>
                    <select name="status" class="form_textbox">
                        <option value="">Pilih Status</option>
                        <option value="pembaik">Bocil Pembaik</option>
                        <option value="replay">Bocil Replay</option>
                        <option value="absen">Bocil Absen Bang</option>
                        <option value="ngaku">Bocil Ngaku-ngaku</option>
                        <option value="ngeyel">Bocil Ngeyel</option>
                        <option value="skem">Bocil Skem</option>
                        <option value="kematian">Bocil Kematian</option>
                    </select>

                    <!-- Kata-kata -->
                    <label class="form_label">Kata-kata Terkocak Bang Windah</label>
                    <textarea name="kata_kocak" class="form_textbox" 
                    placeholder="Kata-kata terlucu yang pernah diucapkan bang windah menurut kamu. Contoh: emang gitu liriknya kocak"></textarea>

                    <!-- Persetujuan -->
                    <label class="form_label">Apakah kamu bersedia dipanggil bocil bang windah?</label>
                    <ul class="form_checkbox">
                        <li>
                            <input type="checkbox" name="agree" value="yes">
                            <span>YA YA SAYA BERSEDIA☝🏼☝🏼</span>
                        </li>
                    </ul>

                    <input type="submit" value="DAFTAR" class="form_button">
                </form>
            </div>
        </div>
    </div>
</body>
</html>
